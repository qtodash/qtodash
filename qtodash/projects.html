<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qtodash | Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="wordmark" href="index.html">qtodash</a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
          <span class="bar" aria-hidden="true"></span>
        </button>
        <nav class="site-nav" aria-label="Primary navigation">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a class="active" href="projects.html">Projects</a></li>
            <li><a href="creative.html">Creative</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section>
        <div class="container">
          <h1>Things I&apos;ve Built</h1>
          <p class="muted">Web products, tools, and experiments.</p>
        </div>
      </section>

      <section>
        <div class="container">
          <div class="card-grid">
            <article class="card">
              <h3>Dailynest - Habit Tracker PWA</h3>
              <p class="muted">A lightweight habit tracking progressive web app.</p>
              <div class="tag-row mono">
                <span class="tag">Web App</span>
                <span class="tag">PWA</span>
              </div>
              <a class="btn btn-primary" href="https://dailynest.netlify.app">Visit</a>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>Always working on something.</p>
        <div class="social-row mono">
          <a href="#">GitHub</a>
          <a href="#">YouTube</a>
          <a href="https://instagram.com/qtodash">Instagram</a>
        </div>
        <p class="copyright">&copy; qtodash</p>
      </div>
    </footer>

    <script>
      (function () {
        const button = document.querySelector(".nav-toggle");
        const nav = document.querySelector(".site-nav");
        if (!button || !nav) return;

        button.addEventListener("click", function () {
          nav.classList.toggle("is-open");
          const expanded = nav.classList.contains("is-open");
          button.setAttribute("aria-expanded", String(expanded));
        });
      })();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("serviceworker.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
